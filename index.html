<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Виджет-Фортепиано</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .piano {
            display: flex;
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 200px;
            margin: 10px 0;
        }
        .key {
            cursor: pointer;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 10px;
            font-size: 12px;
            color: #555;
            transition: background 0.05s, transform 0.05s;
        }
        .white {
            background: white;
            height: 100%;
            flex: 1;
            border-radius: 0 0 5px 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1;
        }
        .white.active {
            background: #e0e0e0;
            transform: translateY(2px);
        }
        .black {
            background: #1a1a1a;
            height: 60%;
            width: 8%;
            position: absolute;
            top: 0;
            border-radius: 0 0 3px 3px;
            z-index: 2;
            color: white;
            font-size: 10px;
            padding-bottom: 5px;
            border: 1px solid #000;
        }
        .black.active {
            background: #444;
            transform: translateY(2px);
        }
        .info {
            margin-top: 10px;
            font-size: 13px;
            color: #666;
            text-align: center;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 5px;
            align-items: center;
        }
        .controls button {
            padding: 5px 10px;
            border: 1px solid #ccc;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .controls button:hover {
            background: #e0e0e0;
        }
        #octaveDisplay {
            font-size: 13px;
            color: #333;
            min-width: 70px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="piano" id="piano"></div>
    <div class="info" id="info">Клавиши: §/> 1 2 3 4 5 6 7 8 9 0 - =</div>
    <div class="controls">
        <button id="octaveDown">⬅ Октава вниз</button>
        <span id="octaveDisplay">Октава 4</span>
        <button id="octaveUp">Октава вверх ➡</button>
    </div>

    <script>
        // ----- Настройки -----
        const noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        // Маппинг клавиш: клавиша -> индекс ноты в октаве (0-11)
        // Добавлена клавиша '§' для ноты C (индекс 0)
        const keyMap = {
            '>': 0,  // C
            '§': 0,  // C (альтернативная клавиша)
            '1': 1,  // C#
            '2': 2,  // D
            '3': 3,  // D#
            '4': 4,  // E
            '5': 5,  // F
            '6': 6,  // F#
            '7': 7,  // G
            '8': 8,  // G#
            '9': 9,  // A
            '0': 10, // A#
            '-': 11, // B
            '=': 12  // C (следующая октава)
        };

        let currentOctave = 4;
        const pianoElement = document.getElementById('piano');
        const octaveDisplay = document.getElementById('octaveDisplay');
        
        // Хранилище для активных осцилляторов и гейнов
        const activeNotes = {};

        // ----- Создание клавиш -----
        function renderPiano(octave) {
            pianoElement.innerHTML = '';
            const whiteKeys = [0, 2, 4, 5, 7, 9, 11]; // Индексы белых клавиш
            const blackKeys = [1, 3, 6, 8, 10];        // Индексы черных клавиш

            // Белые клавиши
            whiteKeys.forEach((noteIndex) => {
                const key = document.createElement('div');
                key.className = 'key white';
                key.dataset.note = noteIndex;
                key.dataset.octave = octave;
                key.textContent = noteNames[noteIndex];
                key.addEventListener('mousedown', () => startNote(noteIndex, octave));
                key.addEventListener('mouseup', () => stopNote(noteIndex, octave));
                key.addEventListener('mouseleave', () => stopNote(noteIndex, octave));
                pianoElement.appendChild(key);
            });

            // Черные клавиши (позиционируем поверх)
            blackKeys.forEach((noteIndex) => {
                const key = document.createElement('div');
                key.className = 'key black';
                key.dataset.note = noteIndex;
                key.dataset.octave = octave;
                key.textContent = noteNames[noteIndex];
                
                // Позиционирование: рассчитываем смещение в процентах от ширины контейнера
                let leftPercent;
                if (noteIndex === 1) { // C#
                    leftPercent = 10;
                } else if (noteIndex === 3) { // D#
                    leftPercent = 24;
                } else if (noteIndex === 6) { // F#
                    leftPercent = 50;
                } else if (noteIndex === 8) { // G#
                    leftPercent = 64;
                } else if (noteIndex === 10) { // A#
                    leftPercent = 78;
                }
                key.style.left = `calc(${leftPercent}% - 4%)`; // -4% это половина ширины черной клавиши (8%)
                key.addEventListener('mousedown', () => startNote(noteIndex, octave));
                key.addEventListener('mouseup', () => stopNote(noteIndex, octave));
                key.addEventListener('mouseleave', () => stopNote(noteIndex, octave));
                pianoElement.appendChild(key);
            });
            octaveDisplay.textContent = `Октава ${octave}`;
        }

        // ----- Воспроизведение звука (Web Audio API) -----
        let audioCtx = null;

        function startNote(noteIndex, octave) {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            const noteId = `${noteIndex}-${octave}`;
            if (activeNotes[noteId]) {
                return; // Нота уже играет
            }

            // Частота: A4 = 440Hz. Формула: 440 * 2^((n-69)/12)
            const midiNumber = (octave + 1) * 12 + noteIndex; 
            const freq = 440 * Math.pow(2, (midiNumber - 69) / 12);
            
            // Создаем осциллятор для основного тона
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            // Создаем второй осциллятор для обертонов (более богатый звук)
            const overtoneOscillator = audioCtx.createOscillator();
            const overtoneGainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            overtoneOscillator.connect(overtoneGainNode);
            
            gainNode.connect(audioCtx.destination);
            overtoneGainNode.connect(audioCtx.destination);
            
            oscillator.frequency.value = freq;
            oscillator.type = 'sine'; // Основной тон - синусоида
            
            overtoneOscillator.frequency.value = freq * 2; // Обертон на октаву выше
            overtoneOscillator.type = 'triangle'; // Обертон - треугольник
            
            // Начальная громкость
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            overtoneGainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            
            oscillator.start();
            overtoneOscillator.start();

            // Сохраняем ссылки на осцилляторы и гейны, чтобы остановить их позже
            activeNotes[noteId] = {
                oscillator,
                overtoneOscillator,
                gainNode,
                overtoneGainNode
            };

            // Визуальный отклик
            const key = document.querySelector(`.key[data-note="${noteIndex}"][data-octave="${octave}"]`);
            if (key) {
                key.classList.add('active');
            }
        }

        function stopNote(noteIndex, octave) {
            const noteId = `${noteIndex}-${octave}`;
            const noteData = activeNotes[noteId];
            
            if (!noteData) {
                return;
            }

            // Плавное затухание звука
            const releaseTime = 0.3; // Время затухания в секундах
            noteData.gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + releaseTime);
            noteData.overtoneGainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + releaseTime);
            
            // Останавливаем осцилляторы после затухания
            noteData.oscillator.stop(audioCtx.currentTime + releaseTime);
            noteData.overtoneOscillator.stop(audioCtx.currentTime + releaseTime);
            
            // Удаляем ноту из активных через время затухания
            setTimeout(() => {
                delete activeNotes[noteId];
            }, releaseTime * 1000);

            // Убираем визуальный отклик
            const key = document.querySelector(`.key[data-note="${noteIndex}"][data-octave="${octave}"]`);
            if (key) {
                key.classList.remove('active');
            }
        }

        // ----- Обработка клавиатуры -----
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            // Проверяем модификаторы
            if (e.key === 'Meta' && e.location === 1) { // Левый Command
                e.preventDefault();
                currentOctave = Math.max(0, currentOctave - 1);
                renderPiano(currentOctave);
                return;
            }
            if (e.key === 'Meta' && e.location === 2) { // Правый Command
                e.preventDefault();
                currentOctave = Math.min(8, currentOctave + 1);
                renderPiano(currentOctave);
                return;
            }

            const noteIndex = keyMap[key];
            if (noteIndex !== undefined) {
                e.preventDefault();
                // Если нажата '=', это C следующей октавы
                if (key === '=') {
                    startNote(0, currentOctave + 1);
                } else {
                    startNote(noteIndex, currentOctave);
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key;
            const noteIndex = keyMap[key];
            if (noteIndex !== undefined) {
                e.preventDefault();
                if (key === '=') {
                    stopNote(0, currentOctave + 1);
                } else {
                    stopNote(noteIndex, currentOctave);
                }
            }
        });

        // ----- Кнопки управления -----
        document.getElementById('octaveDown').addEventListener('click', () => {
            currentOctave = Math.max(0, currentOctave - 1);
            renderPiano(currentOctave);
        });
        document.getElementById('octaveUp').addEventListener('click', () => {
            currentOctave = Math.min(8, currentOctave + 1);
            renderPiano(currentOctave);
        });

        // ----- Инициализация -----
        renderPiano(currentOctave);
    </script>
</body>
</html>
